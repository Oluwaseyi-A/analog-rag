services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp-server:
    build: .
    command: python3 -m src.mcp.server
    env_file: .env
    environment:
      - DB_PATH=/app/data/measurements.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - PDK_ROOT=/data/PDK
      - RAG_DATA_PATH=/data/rag_data
    volumes:
      - /mnt/c/Users/seyil/OneDrive/Documents/LLM/AnalogGym:/data:ro
      - ./src:/app/src
      - app_data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
    ports:
      - "8001:8001"

  app:
    build: .
    command: streamlit run src/ui/app.py --server.port=8501 --server.address=0.0.0.0
    env_file: .env
    environment:
      - DB_PATH=/app/data/measurements.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - PDK_ROOT=/data/PDK
      - RAG_DATA_PATH=/data/rag_data
    volumes:
      - /mnt/c/Users/seyil/OneDrive/Documents/LLM/AnalogGym:/data:ro
      - ./src:/app/src
      - app_data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
      mcp-server:
        condition: service_started
    ports:
      - "8501:8501"

  ingest:
    build: .
    command: python3 -m src.ingestion.ingest --config configs/ingest_config.json
    env_file: .env
    environment:
      - DB_PATH=/app/data/measurements.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - PDK_ROOT=/data/PDK
    volumes:
      - /mnt/c/Users/seyil/OneDrive/Documents/LLM/AnalogGym:/data:ro
      - ./src:/app/src
      - ./configs:/app/configs
      - app_data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
    profiles:
      - ingest

  gnn-train:
    build: .
    command: python3 -m src.ingestion.gnn_train --rag-data /data/rag_data --epochs 50 --output /app/data/gin_weights.pt
    env_file: .env
    environment:
      - RAG_DATA_PATH=/data/rag_data
    volumes:
      - /mnt/c/Users/seyil/OneDrive/Documents/LLM/AnalogGym:/data:ro
      - ./src:/app/src
      - app_data:/app/data
    profiles:
      - train

  eval:
    build: .
    command: python3 -m src.eval.success_criteria --rag-data /data/rag_data --output /app/data/eval_report.json
    env_file: .env
    environment:
      - DB_PATH=/app/data/measurements.db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - RAG_DATA_PATH=/data/rag_data
    volumes:
      - /mnt/c/Users/seyil/OneDrive/Documents/LLM/AnalogGym:/data:ro
      - ./src:/app/src
      - app_data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
    profiles:
      - eval

volumes:
  chroma_data:
  app_data:
